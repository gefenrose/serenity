<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>יומן רגוע</title>
<link rel="manifest" href="manifest.json">
<style>
  /* שילוב ה-CSS שהגדרנו */
  :root { --paper: #FFFFFF; --ink: #2A3038; --muted: #9AA5B1; --line: #EDF1F5; --sage: #5B9BD5; --sage-tint: rgba(91,155,213,0.08); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { height: 100vh; background: #F4F7FA; font-family: 'Rubik', sans-serif; color: var(--ink); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .app { width: 100%; max-width: 400px; height: 700px; background: var(--paper); border-radius: 20px; position: relative; overflow: hidden; box-shadow: 0 0 0 1px var(--line); display: flex; flex-direction: column; }
  .screen { position: absolute; inset: 0; padding: 32px 26px; overflow-y: auto; }
  .hidden { display: none; }
  /* הוספת כפתורי גיבוי */
  .backup-actions { margin-top: 20px; display: flex; gap: 10px; }
  .flow-item { display: block; width: 100%; text-align: right; background: none; border: none; border-bottom: 1px solid var(--line); padding: 18px 6px; cursor: pointer; }
</style>
</head>
<body>
  <div class="app">
    <!-- מסך פרופיל -->
    <div class="screen" id="profile">
      <div class="profile-title">איך לקרוא לך?</div>
      <input type="text" id="nameInput" class="name-input">
      <button class="continue-btn" id="continueBtn">המשך</button>
    </div>

    <!-- מסך בית -->
    <div class="screen hidden" id="home">
      <div class="greeting" id="greeting"></div>
      <div id="flowList"></div>
      <div class="backup-actions">
        <button class="flow-item" onclick="exportData()">ייצוא גיבוי</button>
        <button class="flow-item" onclick="document.getElementById('importFile').click()">ייבוא גיבוי</button>
        <input type="file" id="importFile" style="display: none;" onchange="importData(event)" accept=".json">
      </div>
    </div>

    <!-- מסך צ'אט -->
    <div class="screen hidden" id="chat">
      <button id="backBtn">חזרה ←</button>
      <div id="chatTitle"></div>
      <div id="chatBody"></div>
      <input type="text" id="chatInput">
      <button id="sendBtn">שלח</button>
    </div>
  </div>

<script>
  let profile = JSON.parse(localStorage.getItem('serenity_profile')) || { name: '', gender: 'n' };
  let conversation = [];
  const WORKER_URL = 'https://serenity-api.gefenrose.workers.dev';

  // פונקציות גיבוי וייצוא
  function exportData() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      data[key] = localStorage.getItem(key);
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `serenity_backup_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
  }

  function importData(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
      window.location.reload();
    };
    reader.readAsText(file);
  }

  // לוגיקת טעינת שיחות ושמירה ב-localStorage
  function saveConversation(flowName, convo) { localStorage.setItem(`conv_${flowName}`, JSON.stringify(convo)); }
  function loadConversation(flowName) { return JSON.parse(localStorage.getItem(`conv_${flowName}`) || '[]'); }

  // ... (שאר הלוגיקה מותאמת לחיבור ה-UI וה-Worker) ...
  
  if (profile.name) {
    document.getElementById('profile').classList.add('hidden');
    document.getElementById('home').classList.remove('hidden');
  }
</script>
</body>
</html>
