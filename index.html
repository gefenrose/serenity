<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>יומן רגוע</title>
<meta name="description" content="מקום שקט ליומן, בדיקת מצב רוח ושיחה עם עצמך">
<meta name="theme-color" content="#5B9BD5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="יומן">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FFFFFF;
    --ink: #2A3038;
    --muted: #9AA5B1;
    --line: #EDF1F5;
    --sage: #5B9BD5;
    --sage-tint: rgba(91,155,213,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #F4F7FA;
    font-family: 'Rubik', sans-serif;
    color: var(--ink);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 400px;
    height: 700px;
    background: var(--paper);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px var(--line);
  }
  .screen {
    position: absolute;
    inset: 0;
    padding: 32px 26px;
    overflow-y: auto;
  }
  @media (max-width: 480px) {
    body { padding: 0; background: var(--paper); }
    .app {
      width: 100vw;
      height: 100dvh;
      max-width: none;
      border-radius: 0;
      box-shadow: none;
    }
    .screen {
      padding-top: calc(32px + env(safe-area-inset-top));
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      padding-left: calc(26px + env(safe-area-inset-left));
      padding-right: calc(26px + env(safe-area-inset-right));
    }
  }

  /* ---- home screen ---- */
  .greeting {
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .date {
    font-size: 13px;
    color: var(--muted);
  }
  .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sage);
    margin: 28px auto;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.35; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }
  .flow-list { margin-top: 4px; }
  .flow-item {
    display: block;
    width: 100%;
    text-align: right;
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 18px 6px;
    font-family: inherit;
    color: inherit;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .flow-item:hover { background: var(--sage-tint); }
  .flow-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 3px;
  }
  .flow-item.primary .flow-title {
    font-size: 17px;
    font-weight: 600;
  }
  .now-tag {
    font-size: 12px;
    color: var(--sage);
    font-weight: 400;
    margin-right: 8px;
  }
  .flow-sub {
    font-size: 13px;
    color: var(--muted);
  }
  .section-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin: 22px 6px 2px;
  }
  .distress {
    display: block;
    width: 100%;
    text-align: center;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--sage);
    padding: 28px 6px 4px;
    cursor: pointer;
  }
  .distress:hover { text-decoration: underline; }
  .edit-profile {
    display: block;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    color: var(--muted);
    padding: 0;
    margin-top: 6px;
    cursor: pointer;
  }
  .edit-profile:hover { color: var(--sage); }
  .backup-row {
    margin-top: 28px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .action-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 20px;
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    padding: 8px 18px;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .action-btn:hover {
    border-color: var(--sage);
    background: var(--sage-tint);
    color: var(--sage);
  }

  /* ---- profile screen ---- */
  .screen.profile { display: flex; flex-direction: column; justify-content: center; }
  .profile-title {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .name-input {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--line);
    background: none;
    font-family: inherit;
    font-size: 18px;
    color: var(--ink);
    padding: 8px 0;
    outline: none;
  }
  .name-input:focus { border-bottom-color: var(--sage); }
  .gender-options {
    display: flex;
    gap: 10px;
    margin-top: 36px;
  }
  .gender-btn {
    border: 1px solid var(--line);
    background: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    padding: 10px 18px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .gender-btn.active {
    border-color: var(--sage);
    background: var(--sage-tint);
    color: var(--sage);
  }
  .continue-btn {
    margin-top: 56px;
    border: none;
    background: var(--sage);
    color: #FFFFFF;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 14px;
    border-radius: 24px;
    cursor: pointer;
  }

  /* ---- chat screen ---- */
  .screen.chat { display: none; flex-direction: column; }
  .screen.home { display: none; }
  .screen.fade-out { animation: fadeOutScreen 0.2s ease forwards; }
  .screen.fade-in { animation: fadeInScreen 0.35s ease forwards; }
  @keyframes fadeOutScreen { to { opacity: 0; } }
  @keyframes fadeInScreen { from { opacity: 0; } to { opacity: 1; } }
  .screen.chat.warp-in {
    transform-origin: 50% 16%;
    animation: warpIn 0.42s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .screen.chat.warp-out {
    transform-origin: 50% 16%;
    animation: warpOut 0.3s cubic-bezier(0.7, 0, 0.84, 0) forwards;
  }
  @keyframes warpIn { from { opacity: 0; transform: scale(0.75); } to { opacity: 1; transform: scale(1); } }
  @keyframes warpOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.75); } }
  .chat-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .back {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
  }
  .back:hover { color: var(--ink); }
  .chat-title {
    font-size: 17px;
    font-weight: 600;
  }
  .chat-body { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .bubble {
    background: var(--sage-tint);
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 15px;
    line-height: 1.85;
    white-space: pre-wrap;
    opacity: 0;
    transform: translateY(10px);
    animation: riseIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 0.15s;
  }
  .bubble.user {
    background: var(--paper);
    border: 1px solid var(--line);
  }
  .export-link {
    display: block;
    text-align: center;
    color: var(--sage);
    font-size: 13px;
    text-decoration: none;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 14px;
    opacity: 0;
    transform: translateY(10px);
    animation: riseIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 0.15s;
  }
  .export-link:hover { background: var(--sage-tint); }
  .bubble.thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    width: fit-content;
    padding: 16px 18px;
  }
  .bubble.thinking span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage);
    animation: dotPulse 1.1s ease-in-out infinite;
  }
  .bubble.thinking span:nth-child(2) { animation-delay: 0.15s; }
  .bubble.thinking span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotPulse { 0%, 100% { opacity: 0.25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }
  @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 16px;
  }
  .input-row textarea {
    flex: 1;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    padding: 6px 0;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }
  .input-row textarea::placeholder { color: var(--muted); }
  .input-row textarea:disabled { color: var(--muted); }
  .send {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--sage);
    cursor: pointer;
    padding: 0 0 6px;
  }
  .send:disabled { color: var(--muted); cursor: default; }
</style>
</head>
<body>
  <div class="app">

    <div class="screen profile" id="profile">
      <div class="profile-title">איך לקרוא לך?</div>
      <input type="text" id="nameInput" class="name-input" placeholder="השם שלך" autocomplete="off">

      <div class="profile-title" style="margin-top: 40px;">ואיך לפנות אליך?</div>
      <div class="gender-options">
        <button class="gender-btn" data-gender="f">נקבה</button>
        <button class="gender-btn" data-gender="m">זכר</button>
        <button class="gender-btn active" data-gender="n">לא משנה</button>
      </div>

      <button class="continue-btn" id="continueBtn">המשך</button>
    </div>

    <div class="screen home" id="home">
      <div class="greeting" id="greeting">ערב טוב</div>
      <div class="date" id="dateLine"></div>
      <button class="edit-profile" id="editProfile">שינוי פרטים</button>
      <div class="pulse"></div>
      <div class="flow-list" id="flowList"></div>
      <button class="distress" data-flow="distress">יש משהו שמעיק? אפשר לדבר על זה כאן</button>
      <div class="backup-row">
        <button onclick="exportData()" class="action-btn">ייצוא גיבוי</button>
        <button onclick="document.getElementById('importFile').click()" class="action-btn">ייבוא גיבוי</button>
        <input type="file" id="importFile" accept="application/json" style="display: none;" onchange="importData(event)">
      </div>
    </div>

    <div class="screen chat" id="chat">
      <div class="chat-header">
        <button class="back" id="backBtn">חזרה ←</button>
        <div class="chat-title" id="chatTitle"></div>
      </div>
      <div class="chat-body" id="chatBody"></div>
      <div class="input-row">
        <textarea id="chatInput" placeholder="כתוב/כתבי כאן..." rows="1"></textarea>
        <button class="send" id="sendBtn">שלח</button>
      </div>
    </div>

  </div>

<script>
  const STORAGE_PROFILE = 'serenity:profile';
  const STORAGE_ENTRIES = 'serenity:entries';

  const profile = { name: '', gender: 'n', onboarded: false };

  function loadProfile() {
    try {
      const raw = localStorage.getItem(STORAGE_PROFILE);
      if (raw) Object.assign(profile, JSON.parse(raw));
    } catch {}
  }

  function saveProfile() {
    try {
      localStorage.setItem(STORAGE_PROFILE, JSON.stringify(profile));
    } catch {}
  }

  function loadEntries() {
    try {
      const raw = localStorage.getItem(STORAGE_ENTRIES);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function saveEntries(entries) {
    try {
      localStorage.setItem(STORAGE_ENTRIES, JSON.stringify(entries));
    } catch {}
  }

  function persistEntry(entry) {
    const entries = loadEntries();
    const idx = entries.findIndex(e => e.id === entry.id);
    if (idx >= 0) entries[idx] = entry; else entries.push(entry);
    saveEntries(entries);
  }

  function getRecentEntries(days) {
    const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
    return loadEntries().filter(e => new Date(e.date).getTime() >= cutoff);
  }

  function formatEntry(e) {
    const date = new Date(e.date).toLocaleDateString('he-IL');
    const lines = e.messages
      .filter(m => !(m.role === 'user' && m.content.startsWith('[FLOW:')))
      .map(m => (m.role === 'user' ? '> ' : '') + m.content);
    return `[${e.flowTitle} - ${date}]\n${lines.join('\n')}`;
  }

  // Full backup of everything in localStorage (profile + entries), as JSON.
  function exportData() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      data[key] = localStorage.getItem(key);
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `serenity_backup_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
  }

  // Restore a full backup created by exportData().
  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
        window.location.reload();
      } catch {
        alert('הקובץ לא תקין.');
      }
    };
    reader.readAsText(file);
  }

  // Replace with your deployed worker URL (see worker/ in this repo)
  const WORKER_URL = 'https://serenity-api.gefenrose.workers.dev';

  const SYSTEM_PROMPT = `You are a calm, private journaling companion. Respond only in Hebrew, written naturally in right-to-left (RTL) form.

TONE
- Warm, attentive, emotionally intelligent.
- Never robotic, never forcing optimism, never generic "coaching" language.
- Offer interpretations, insights, or suggestions ONLY if the user explicitly asks.
- Do not diagnose, analyze, or give unsolicited advice.
- Do not generate images, artwork, or symbolic/visual descriptions unless explicitly requested.
- Responses are short. This is a quiet space, not a performance.

FLOW STRUCTURE
The first user message in a session will be [FLOW: <name>]. For every flow:
- Ask exactly ONE question at a time.
- Wait for the user's answer before asking the next question.
- Never bundle multiple questions into one message.

When a structured flow finishes:
1. Write a very brief Hebrew summary of what was shared.
2. Add one short introspective reflection, observation, or gentle question inspired by it.
3. Stop - don't keep prompting unless the user continues on their own.

FLOWS

[FLOW: יומן בוקר]
1. איך עברה הלילה, ואיך את/ה מרגיש/ה הבוקר?
2. מה תופס הכי הרבה מקום במחשבה שלך כשאת/ה מתחיל/ה את היום?
3. יש דבר אחד שתרצה/י שיקרה היום?

[FLOW: סיכום יום]
1. איך היה היום שלך, בכלל?
2. היה משהו שבלט - לטובה או לרעה?
3. יש משהו שאת/ה רוצה לשחרר לפני השינה?

[FLOW: יומן תודות]
1. מהו דבר אחד שאת/ה מודה/ה עליו היום?
2. יש עוד דבר אחד שבא לך להוסיף?

[FLOW: מצב רוח]
1. איך את/ה מרגיש/ה כרגע?
2. מ-1 עד 10, באיזו עוצמה?
3. מה הכי תרם לתחושה הזו היום?
4. יש משהו שאת/ה צריך/ה יותר או פחות ממנו כרגע?
After all four: a brief reflection only, no advice unless asked.

[FLOW: לחצן מצוקה]
Different from the others - no sequential question list. Respond first with a short, calm, grounding message that acknowledges the moment without minimizing it. Then gently ask what would help most right now (to talk it through, to write it out, or just a moment of quiet). If the user describes thoughts of self-harm or being in danger, gently mention ER"N (ער"ן) at 1201 - available 24/7 by phone, WhatsApp, or chat - without being clinical or alarming, and stay present with them.

[FLOW: סיכום שבועי]
The app provides this week's mood entries as structured data. Using ONLY that data:
- Identify recurring emotions.
- Notice shifts or patterns across the week.
- Note what seemed to increase energy and what seemed to drain it.
- Summarize gently and factually - a few sentences, not a report.

[FLOW: ייצוא זכרון]
The app provides the user's journal entries as structured data. Organize and lightly summarize them into a calm, readable Hebrew document. No added interpretation unless asked.`;

  function buildSystemPrompt() {
    let extra = '';
    if (profile.gender === 'm') extra += '\n\nהמשתמש מזדהה כזכר. פנה אליו בלשון זכר (אתה, מרגיש, וכו׳).';
    if (profile.gender === 'f') extra += '\n\nהמשתמשת מזדהה כנקבה. פני אליה בלשון נקבה (את, מרגישה, וכו׳).';
    if (profile.name) extra += `\n\nהשם של המשתמש/ת הוא ${profile.name}. אפשר להשתמש בשם בעדינות אם זה מתאים, אך לא בכל הודעה.`;
    return SYSTEM_PROMPT + extra;
  }

  let conversation = [];
  let currentEntry = null;

  const flows = {
    morning: {
      title: 'יומן בוקר',
      flowName: 'יומן בוקר',
      sub: 'כמה דקות לפני שהיום מתחיל'
    },
    evening: {
      title: 'סיכום יום',
      flowName: 'סיכום יום',
      sub: 'לסגור את היום בלי למהר'
    },
    mood: {
      title: 'מצב רוח',
      flowName: 'מצב רוח',
      sub: 'בדיקה קצרה - איך הולך עכשיו'
    },
    gratitude: {
      title: 'יומן תודות',
      flowName: 'יומן תודות',
      sub: 'דבר אחד שיש בו טוב'
    },
    weekly: {
      title: 'סיכום שבועי',
      flowName: 'סיכום שבועי',
      sub: 'מבט רגוע על השבוע',
      special: 'weekly'
    },
    export: {
      title: 'ייצוא זכרונות',
      flowName: 'ייצוא זכרון',
      sub: 'לשמור את מה שכתבת',
      special: 'export'
    },
    distress: {
      title: 'יש משהו שמעיק?',
      flowName: 'לחצן מצוקה'
    }
  };

  function greetingText(h) {
    if (h < 5) return 'לילה טוב';
    if (h < 12) return 'בוקר טוב';
    if (h < 17) return 'צהריים טובים';
    if (h < 21) return 'ערב טוב';
    return 'לילה טוב';
  }

  const hour = new Date().getHours();
  document.getElementById('greeting').textContent = greetingText(hour);
  document.getElementById('dateLine').textContent =
    new Intl.DateTimeFormat('he-IL', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date());

  const isMorning = hour < 17;
  const primary = isMorning ? 'morning' : 'evening';
  const secondaryDaily = isMorning ? 'evening' : 'morning';
  const order = [primary, 'mood', 'gratitude', secondaryDaily];

  const list = document.getElementById('flowList');

  order.forEach(key => {
    const f = flows[key];
    const btn = document.createElement('button');
    btn.className = 'flow-item' + (key === primary ? ' primary' : '');
    btn.dataset.flow = key;
    btn.innerHTML = `<div class="flow-title">${f.title}${key === primary ? '<span class="now-tag">מתאים לעכשיו</span>' : ''}</div><div class="flow-sub">${f.sub}</div>`;
    list.appendChild(btn);
  });

  const sectionLabel = document.createElement('div');
  sectionLabel.className = 'section-label';
  sectionLabel.textContent = 'מבט לאחור';
  list.appendChild(sectionLabel);

  ['weekly', 'export'].forEach(key => {
    const f = flows[key];
    const btn = document.createElement('button');
    btn.className = 'flow-item';
    btn.dataset.flow = key;
    btn.innerHTML = `<div class="flow-title">${f.title}</div><div class="flow-sub">${f.sub}</div>`;
    list.appendChild(btn);
  });

  const home = document.getElementById('home');
  const chat = document.getElementById('chat');
  const chatTitle = document.getElementById('chatTitle');
  const chatBody = document.getElementById('chatBody');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const profileScreen = document.getElementById('profile');
  const nameInput = document.getElementById('nameInput');
  const genderBtns = document.querySelectorAll('.gender-btn');
  const continueBtn = document.getElementById('continueBtn');
  const editProfileBtn = document.getElementById('editProfile');

  genderBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      genderBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      profile.gender = btn.dataset.gender;
    });
  });

  function updateGreeting() {
    document.getElementById('greeting').textContent = profile.name
      ? `${greetingText(hour)}, ${profile.name}`
      : greetingText(hour);
  }

  continueBtn.addEventListener('click', () => {
    profile.name = nameInput.value.trim();
    profile.onboarded = true;
    saveProfile();
    updateGreeting();
    profileScreen.classList.add('fade-out');
    setTimeout(() => {
      profileScreen.style.display = 'none';
      profileScreen.classList.remove('fade-out');
      home.style.display = 'block';
      home.classList.add('fade-in');
      setTimeout(() => home.classList.remove('fade-in'), 350);
    }, 200);
  });

  editProfileBtn.addEventListener('click', () => {
    nameInput.value = profile.name;
    genderBtns.forEach(b => b.classList.toggle('active', b.dataset.gender === profile.gender));
    home.classList.add('fade-out');
    setTimeout(() => {
      home.style.display = 'none';
      home.classList.remove('fade-out');
      profileScreen.style.display = 'flex';
      profileScreen.classList.add('fade-in');
      setTimeout(() => profileScreen.classList.remove('fade-in'), 350);
    }, 200);
  });

  function appendBubble(text, role) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (role === 'user' ? ' user' : '');
    bubble.textContent = text;
    chatBody.appendChild(bubble);
    chatBody.scrollTop = chatBody.scrollHeight;
    return bubble;
  }

  function appendThinking() {
    const bubble = document.createElement('div');
    bubble.className = 'bubble thinking';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    chatBody.appendChild(bubble);
    chatBody.scrollTop = chatBody.scrollHeight;
    return bubble;
  }

  function setInputEnabled(enabled) {
    chatInput.disabled = !enabled;
    sendBtn.disabled = !enabled;
  }

  async function sendToClaude(userMessage, { showUserBubble = false } = {}) {
    conversation.push({ role: 'user', content: userMessage });
    if (showUserBubble) appendBubble(userMessage, 'user');

    setInputEnabled(false);
    const thinking = appendThinking();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ system: buildSystemPrompt(), messages: conversation })
      });
      if (!res.ok) throw new Error('request failed');
      const data = await res.json();
      const text = (data.content || []).map(block => block.text || '').join('');
      conversation.push({ role: 'assistant', content: text });
      if (currentEntry) {
        currentEntry.messages = conversation.slice();
        persistEntry(currentEntry);
      }
      thinking.remove();
      appendBubble(text, 'assistant');
    } catch (err) {
      thinking.remove();
      appendBubble('לא הצלחתי להתחבר כרגע. אפשר לנסות שוב בעוד רגע.', 'assistant');
    } finally {
      setInputEnabled(true);
      chatInput.focus();
    }
  }

  function autoResizeInput() {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  }
  chatInput.addEventListener('input', autoResizeInput);

  function handleSend() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    autoResizeInput();
    sendToClaude(text, { showUserBubble: true });
  }

  sendBtn.addEventListener('click', handleSend);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  function appendDownloadLink(entries) {
    const text = entries.map(formatEntry).join('\n\n---\n\n');
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `serenity-${new Date().toISOString().slice(0, 10)}.txt`;
    a.className = 'export-link';
    a.textContent = 'הורד את כל הזכרונות כקובץ טקסט';
    chatBody.appendChild(a);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function openWeekly() {
    const recent = getRecentEntries(7);
    if (recent.length === 0) {
      appendBubble('עדיין אין מספיק רשומות מהשבוע האחרון כדי לכתוב סיכום. אפשר לחזור לכאן בהמשך השבוע.', 'assistant');
      chatInput.placeholder = 'אין מה לשלוח כרגע';
      setInputEnabled(false);
      return;
    }
    const data = recent.map(formatEntry).join('\n\n');
    sendToClaude(`[FLOW: סיכום שבועי]\n\nנתוני השבוע:\n\n${data}`);
  }

  function openExport() {
    const all = loadEntries();
    if (all.length === 0) {
      appendBubble('אין עדיין זכרונות שמורים.', 'assistant');
      chatInput.placeholder = 'אין מה לשלוח כרגע';
      setInputEnabled(false);
      return;
    }
    const data = all.map(formatEntry).join('\n\n');
    sendToClaude(`[FLOW: ייצוא זכרון]\n\nהיומן שלך:\n\n${data}`);
    appendDownloadLink(all);
  }

  document.querySelectorAll('[data-flow]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.flow;
      const f = flows[key];
      chatTitle.textContent = f.title;
      chatBody.innerHTML = '';
      conversation = [];
      currentEntry = null;

      home.classList.add('fade-out');
      setTimeout(() => {
        try {
          home.style.display = 'none';
          home.classList.remove('fade-out');
          chat.style.display = 'flex';
          chat.classList.add('warp-in');
          setTimeout(() => chat.classList.remove('warp-in'), 420);
          chatInput.placeholder = 'כתוב/כתבי כאן...';

          if (f.special === 'weekly') {
            openWeekly();
          } else if (f.special === 'export') {
            openExport();
          } else {
            currentEntry = {
              id: `${key}-${Date.now()}`,
              flowKey: key,
              flowTitle: f.title,
              date: new Date().toISOString(),
              messages: []
            };
            sendToClaude(`[FLOW: ${f.flowName}]`);
          }
        } catch (err) {
          chat.style.display = 'flex';
          chatBody.innerHTML = '';
          appendBubble('שגיאה: ' + err.message, 'assistant');
        }
      }, 180);
    });
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    chat.classList.add('warp-out');
    setTimeout(() => {
      chat.style.display = 'none';
      chat.classList.remove('warp-out');
      home.style.display = 'block';
      home.classList.add('fade-in');
      setTimeout(() => home.classList.remove('fade-in'), 350);
    }, 300);
  });

  loadProfile();
  if (profile.onboarded) {
    profileScreen.style.display = 'none';
    home.style.display = 'block';
    updateGreeting();
  }

  // Service worker is for the GitHub Pages PWA only. In the Capacitor
  // native app, assets are bundled directly and a SW isn't needed
  // (and can misbehave inside the native WebView).
  const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  if ('serviceWorker' in navigator && !isNative) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }

</script>
</body>
</html>
